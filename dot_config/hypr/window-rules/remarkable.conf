





windowrule {
  name = remarkable_main
  match:class = remarkable.exe
  match:title = reMarkable

  tile = true
}

windowrule {
  name = remarkable_screenshare
  match:class = reMarkable.exe
  match:title = ^Screen Share$

  float = true
}


# Force various windows to not float
#windowrulev2 = tile, class:^remarkable\.exe$, title:^reMarkable$ # The initial reMarkable window starts floating, ensure it gets pinned
#windowrulev2 = float, class:^reMarkable\.exe$, title:^Screen Share$ # Want the screen share window to be floating

