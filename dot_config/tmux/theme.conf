# vi: ft=tmux:ts=2:sw=2
# shellcheck disable=all

set-option -g status-position "bottom"
set-option -g status-style bg=default,fg=default
set-option -g status-justify centre
set-option -g status-left '#[bg=default,fg=default,bold]#{?client_prefix,,  tmux  }#[bg=#698DDA,fg=black,bold]#{?client_prefix,  tmux  ,}'

set -goq @themepack-status-left-area-middle-format "#I:#P"
set -goq @themepack-status-left-area-right-format ""

set-option -g window-status-format ' #I:#W '
set-option -g window-status-current-format '#[bg=#698DDA,fg=#000000] #I:#W#{?window_zoomed_flag, Z , }'

set -goq @themepack-status-right-area-left-format ""
set -goq @themepack-status-right-area-middle-format "#(whoami)"
set -goq @themepack-status-right-area-right-format "#H"

