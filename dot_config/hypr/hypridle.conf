general {
    lock_cmd = pidof hyprlock || hyprlock  # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session  # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.

    ignore_dbus_inhibit = false  # whether to ignore dbus-sent idle-inhibit requests (used by e.g. firefox or steam)
    ignore_systemd_inhibit = false  # whether to ignore systemd-inhibit --what=idle inhibitors
}

listener {
    timeout = 15
    on-timeout = brightnessctl -sd chromeos::kbd_backlight set 20
    on-resume = brightnessctl -sd chromeos::kbd_backlight set 80
}

listener {
    timeout = 330 # 5.5min.
    on-timeout = brightnessctl -s set 40%  # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r  # monitor backlight restore.
}

listener {
    timeout = 360  # 6min
    on-timeout = loginctl lock-session  # lock screen when timeout has passed
}

listener {
    timeout = 390  # 6.5min
    on-timeout = hyprctl dispatch dpms off  # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on && brightnessctl -r  # screen on when activity is detected after timeout has fired.
}

listener {
    timeout = 1800  # 30min
    on-timeout = systemctl sleep  # suspend pc
}
